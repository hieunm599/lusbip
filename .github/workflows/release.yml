name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: lusbip-x86_64-unknown-linux-gnu
            rustflags: ""
            os: ubuntu-latest
            bin_name: lusbip
          - target: aarch64-unknown-linux-musl
            asset_name: lusbip-aarch64-unknown-linux-musl
            rustflags: "-C linker=rust-lld"
            os: ubuntu-latest
            bin_name: lusbip
          - target: x86_64-pc-windows-msvc
            asset_name: lusbip-x86_64-pc-windows-msvc
            rustflags: ""
            os: windows-latest
            bin_name: lusbip.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Verify
        run: |
          cargo fmt --check
          cargo clippy --locked --target ${{ matrix.target }} -- -D warnings
          cargo test --locked

      - name: Build
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          package="${{ matrix.asset_name }}-${version}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/${package}/${{ matrix.bin_name }}"
          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            chmod +x "dist/${package}/${{ matrix.bin_name }}"
          fi
          cp README.md "dist/${package}/README.md" 2>/dev/null || true
          cp THIRD_PARTY.md "dist/${package}/THIRD_PARTY.md"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          overwrite_files: true
